name: 🚀 Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: 🌐 Deploy Frontend (Vercel)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build frontend
        run: npm run build:vercel

      - name: 🚀 Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  health-check:
    name: ✅ Health Check (Render API)
    runs-on: ubuntu-latest
    needs: [deploy-frontend]

    steps:
      - name: ⏳ Wait for deployment
        run: sleep 45

      - name: 🔍 Check Render backend health
        env:
          API_BASE: ${{ vars.ZYEUTE_API_BASE || 'https://zyeutev5-1.onrender.com' }}
        run: |
          curl -f "$API_BASE/api/health"
          curl -f "$API_BASE/api/feed/infinite?limit=3&type=explore&hive=quebec"

      - name: 📣 Notify on success
        if: success()
        run: echo "✅ Production deployment successful (Vercel + Render)"
