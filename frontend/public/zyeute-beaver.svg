<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- Rich Antique Gold Gradient -->
    <linearGradient id="goldEngraved" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4E4C1"/>
      <stop offset="25%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#B8941F"/>
      <stop offset="75%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    
    <!-- Deep Shadow for 3D effect -->
    <filter id="engraveShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
      <feDropShadow dx="-1" dy="-1" stdDeviation="1" flood-color="#F4E4C1" flood-opacity="0.3"/>
    </filter>
    
    <!-- Leather Background Pattern -->
    <radialGradient id="badgeBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A0F0A"/>
      <stop offset="80%" stop-color="#0D0705"/>
      <stop offset="100%" stop-color="#050302"/>
    </radialGradient>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#goldEngraved)" stroke-width="8"/>
  <circle cx="200" cy="200" r="182" fill="none" stroke="url(#goldEngraved)" stroke-width="2" opacity="0.5"/>
  
  <!-- Inner Badge Background -->
  <circle cx="200" cy="200" r="175" fill="url(#badgeBg)"/>
  
  <!-- Inner Ring -->
  <circle cx="200" cy="200" r="165" fill="none" stroke="url(#goldEngraved)" stroke-width="3"/>
  <circle cx="200" cy="200" r="158" fill="none" stroke="url(#goldEngraved)" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  
  <!-- Ornate Beaver Illustration -->
  <g transform="translate(200, 205)" filter="url(#engraveShadow)">
    <g fill="url(#goldEngraved)">
      <!-- Beaver Body - Stylized with scrollwork -->
      <!-- Main body shape -->
      <path d="M-40,20 
               C-50,10 -55,-10 -50,-30 
               C-45,-50 -30,-65 -10,-70 
               C10,-75 30,-70 45,-55 
               C55,-45 60,-30 58,-15 
               C56,0 50,15 40,25 
               L35,30 
               C45,35 55,40 60,50 
               C65,60 62,75 50,80 
               C40,85 25,82 15,75 
               L10,70 
               C5,75 -5,78 -15,75 
               C-30,70 -40,60 -45,45 
               C-48,35 -45,25 -40,20 Z"/>
      
      <!-- Scroll patterns on body -->
      <path d="M-20,-40 
               C-25,-45 -20,-55 -10,-50 
               C0,-45 5,-35 0,-25 
               C-5,-20 -15,-25 -20,-40" 
            fill="none" stroke="#6B4E14" stroke-width="1.5" opacity="0.6"/>
      
      <path d="M10,-30 
               C15,-40 25,-35 30,-25 
               C35,-15 25,-5 15,-10 
               C5,-15 5,-25 10,-30" 
            fill="none" stroke="#6B4E14" stroke-width="1.5" opacity="0.6"/>
      
      <path d="M-10,0 
               C-15,-10 -5,-20 5,-15 
               C15,-10 15,5 5,10 
               C-5,15 -15,10 -10,0" 
            fill="none" stroke="#6B4E14" stroke-width="1.5" opacity="0.6"/>
      
      <!-- Head -->
      <ellipse cx="15" cy="-55" rx="25" ry="22"/>
      
      <!-- Ears -->
      <circle cx="-5" cy="-72" r="8"/>
      <circle cx="35" cy="-68" r="7"/>
      
      <!-- Eye -->
      <ellipse cx="20" cy="-58" rx="4" ry="5" fill="#1A0F0A"/>
      <circle cx="21" cy="-60" r="1.5" fill="#F4E4C1"/>
      
      <!-- Nose -->
      <ellipse cx="42" cy="-52" rx="6" ry="5"/>
      <ellipse cx="43" cy="-53" rx="2" ry="1.5" fill="#6B4E14" opacity="0.5"/>
      
      <!-- Whiskers -->
      <path d="M45,-48 L55,-45" stroke="#8B6914" stroke-width="1" fill="none"/>
      <path d="M45,-48 L56,-50" stroke="#8B6914" stroke-width="1" fill="none"/>
      
      <!-- Maple Leaf in Paw -->
      <g transform="translate(35, 15) rotate(-15)">
        <path d="M0,0 
                 C-5,-5 -8,-15 -3,-20 
                 C-8,-22 -10,-28 -5,-30 
                 C0,-32 0,-38 0,-45 
                 C0,-38 0,-32 5,-30 
                 C10,-28 8,-22 3,-20 
                 C8,-15 5,-5 0,0 Z"/>
        <path d="M0,0 L0,-35" stroke="#6B4E14" stroke-width="1"/>
        <!-- Leaf veins -->
        <path d="M0,-10 L-3,-12 M0,-20 L3,-22 M0,-30 L-2,-32" 
              stroke="#6B4E14" stroke-width="0.5"/>
      </g>
      
      <!-- Paw holding leaf -->
      <ellipse cx="25" cy="20" rx="10" ry="8"/>
      <path d="M20,15 L22,12 M25,14 L27,11 M30,16 L32,13" 
            stroke="#6B4E14" stroke-width="1" fill="none"/>
      
      <!-- Tail -->
      <path d="M-45,50 
               C-70,45 -85,55 -90,70 
               C-95,85 -85,100 -65,105 
               C-45,110 -25,100 -15,85 
               L-10,80 
               C-20,75 -30,70 -35,65 
               C-40,60 -42,55 -45,50 Z"/>
      
      <!-- Tail texture (scales pattern) -->
      <path d="M-60,60 L-55,65 L-50,60" stroke="#6B4E14" stroke-width="1" fill="none" opacity="0.5"/>
      <path d="M-70,70 L-65,75 L-60,70" stroke="#6B4E14" stroke-width="1" fill="none" opacity="0.5"/>
      <path d="M-75,80 L-70,85 L-65,80" stroke="#6B4E14" stroke-width="1" fill="none" opacity="0.5"/>
      <path d="M-70,90 L-65,95 L-60,90" stroke="#6B4E14" stroke-width="1" fill="none" opacity="0.5"/>
      
      <!-- Fur texture lines -->
      <path d="M-30,-50 L-25,-45" stroke="#6B4E14" stroke-width="1" opacity="0.4"/>
      <path d="M-35,-35 L-28,-30" stroke="#6B4E14" stroke-width="1" opacity="0.4"/>
      <path d="M-38,-20 L-32,-15" stroke="#6B4E14" stroke-width="1" opacity="0.4"/>
    </g>
  </g>
  
  <!-- Text: ZYEUTÉ at top -->
  <text x="200" y="65" 
        font-family="'Cormorant Garamond', Georgia, serif" 
        font-size="32" 
        font-weight="700" 
        fill="url(#goldEngraved)" 
        text-anchor="middle"
        letter-spacing="0.2em">ZYEUTÉ</text>
  
  <!-- Text: QUEBEC at bottom -->
  <text x="200" y="355" 
        font-family="'Cormorant Garamond', Georgia, serif" 
        font-size="24" 
        font-weight="600" 
        fill="url(#goldEngraved)" 
        text-anchor="middle"
        letter-spacing="0.15em">QUÉBEC</text>
  
  <!-- Decorative corner flourishes -->
  <g stroke="url(#goldEngraved)" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M30,30 Q50,30 50,50"/>
    <path d="M370,30 Q350,30 350,50"/>
    <path d="M30,370 Q50,370 50,350"/>
    <path d="M370,370 Q350,370 350,350"/>
  </g>
  
  <!-- Fleur-de-lis accents at sides -->
  <g fill="url(#goldEngraved)" opacity="0.6">
    <!-- Left -->
    <g transform="translate(35, 200) scale(0.4)">
      <path d="M0,-30 C-5,-22 -8,-12 -5,-3 C-3,3 -2,9 -2,15 L-5,25 L-2,25 L0,35 L2,25 L5,25 L2,15 C2,9 3,3 5,-3 C8,-12 5,-22 0,-30 Z"/>
      <path d="M-10,-15 C-22,-12 -28,-3 -26,10 C-25,16 -20,20 -14,22 L-9,24 L-11,19 C-14,18 -17,14 -15,7 C-14,3 -13,0 -10,-3 C-8,-7 -7,-11 -10,-15 Z"/>
      <path d="M10,-15 C22,-12 28,-3 26,10 C25,16 20,20 14,22 L9,24 L11,19 C14,18 17,14 15,7 C14,3 13,0 10,-3 C8,-7 7,-11 10,-15 Z"/>
    </g>
    <!-- Right -->
    <g transform="translate(365, 200) scale(0.4)">
      <path d="M0,-30 C-5,-22 -8,-12 -5,-3 C-3,3 -2,9 -2,15 L-5,25 L-2,25 L0,35 L2,25 L5,25 L2,15 C2,9 3,3 5,-3 C8,-12 5,-22 0,-30 Z"/>
      <path d="M-10,-15 C-22,-12 -28,-3 -26,10 C-25,16 -20,20 -14,22 L-9,24 L-11,19 C-14,18 -17,14 -15,7 C-14,3 -13,0 -10,-3 C-8,-7 -7,-11 -10,-15 Z"/>
      <path d="M10,-15 C22,-12 28,-3 26,10 C25,16 20,20 14,22 L9,24 L11,19 C14,18 17,14 15,7 C14,3 13,0 10,-3 C8,-7 7,-11 10,-15 Z"/>
    </g>
  </g>
</svg>