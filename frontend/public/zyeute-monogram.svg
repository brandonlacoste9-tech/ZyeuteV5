<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <pattern id="fleurPattern" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <!-- Subtle fleur-de-lis repeating pattern -->
      <g opacity="0.08" fill="#C9A227">
        <path d="M25,10 C23,14 22,18 23,22 C24,24 24,27 24,30 L22,35 L25,35 L25,40 L28,35 L25,30 C25,27 26,24 27,22 C28,18 27,14 25,10 Z"/>
      </g>
    </pattern>
    
    <linearGradient id="goldMono" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#B8941F"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
  
  <!-- Background with pattern -->
  <rect width="100" height="100" fill="#1a1510"/>
  <rect width="100" height="100" fill="url(#fleurPattern)"/>
  
  <!-- Center Monogram -->
  <g transform="translate(50, 50)">
    <!-- Stylized Z with Fleur -->
    <g stroke="url(#goldMono)" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M-30,-25 L30,-25 L-30,25 L30,25"/>
    </g>
    
    <!-- Small fleur overlay -->
    <g transform="scale(0.4)" fill="url(#goldMono)">
      <path d="M0,-45 C-8,-35 -12,-20 -8,-5 C-5,5 -3,15 -3,25 L-8,40 L-3,40 L0,55 L3,40 L8,40 L3,25 C3,15 5,5 8,-5 C12,-20 8,-35 0,-45 Z"/>
      <path d="M-15,-25 C-35,-20 -45,-5 -40,15 C-38,25 -30,32 -20,35 L-12,38 L-15,30 C-20,28 -25,22 -22,12 C-20,5 -18,0 -15,-5 C-12,-12 -10,-18 -15,-25 Z"/>
      <path d="M15,-25 C35,-20 45,-5 40,15 C38,25 30,32 20,35 L12,38 L15,30 C20,28 25,22 22,12 C20,5 18,0 15,-5 C12,-12 10,-18 15,-25 Z"/>
    </g>
  </g>
  
  <!-- Border -->
  <rect x="5" y="5" width="90" height="90" rx="10" fill="none" stroke="url(#goldMono)" stroke-width="1" stroke-dasharray="4 2" opacity="0.5"/>
</svg>