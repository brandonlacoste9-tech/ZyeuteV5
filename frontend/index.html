<!doctype html>
<html lang="fr-CA">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Zyeuté - L'app sociale du Québec 🇨🇦⚜️</title>

    <!-- Prevent Google Translate interference with React -->
    <meta name="google" content="notranslate" />
    <meta
      name="description"
      content="Partage tes photos et vidéos avec le Québec entier! La seule app sociale 100% québécoise."
    />
    <!-- Match phone status/navigation bar with app leather background -->
    <meta name="theme-color" content="#0D0705" />
    
    <!-- Cache control - force fresh load -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Google Fonts - Inter & Cormorant Garamond (Elegant Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Zyeuté" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/zyeute_app_icon.png" />
    <link rel="apple-touch-icon" href="/zyeute_app_icon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Zyeute — La scène québécoise" />
    <meta property="og:description" content="Partage tes vidéos et connecte-toi avec le Québec entier. La plateforme vidéo 100% québécoise." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://zyeute.com/zyeute_og_image.png" />
    <meta property="og:url" content="https://zyeute.com" />
    <meta property="og:site_name" content="Zyeute" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://zyeute.com/zyeute_og_image.png" />
    <meta name="twitter:title" content="Zyeute — La scène québécoise" />
    <meta name="twitter:description" content="La plateforme vidéo 100% québécoise." />

    <style>
      html,
      body {
        margin: 0;
        background: #0D0705;
        color: #e5e7eb;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        line-height: 1.6;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100vh;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration - DEFERRED to avoid blocking initial load/freeze -->
    <script>
      if ("serviceWorker" in navigator && !window.location.search.includes("noSW=1")) {
        window.addEventListener("load", () => {
          (window.requestIdleCallback || function(cb) { setTimeout(cb, 1); })(() => {
            navigator.serviceWorker
              .register("/sw.js", { updateViaCache: "none" })
              .then((registration) => {
                console.log("✅ SW registered:", registration.scope);
                registration.update();
                setInterval(() => registration.update(), 60 * 60 * 1000);
              })
              .catch((error) => {
                console.error("❌ SW registration failed:", error);
              });
          }, { timeout: 3000 });
        });
      }
    </script>
  </body>
</html>
